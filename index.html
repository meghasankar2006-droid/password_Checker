<!DOCTYPE html>
<html>
<head>
    <title>Password Strength Checker</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }
        input {
            padding: 10px;
            width: 200px;
        }
        #result {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Password Strength Checker</h2>

    <input type="password" id="password" placeholder="Enter password" onkeyup="checkPassword()">

    <div id="result"></div>

    <script>
        function checkPassword() {
            let pass = document.getElementById("password").value;
            let strength = "";

            if (pass.length < 4) {
                strength = "Weak";
            }
            else if (pass.length < 8) {
                strength = "Medium";
            }
            else {
                strength = "Strong";
            }

            document.getElementById("result").innerHTML = strength;
        }
    </script>

</body>
</html>
