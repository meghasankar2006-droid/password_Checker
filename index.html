<!DOCTYPE html>
<html>
<head>
    <title>Password Strength Checker</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        .input-box {
            position: relative;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .toggle {
            position: absolute;
            right: 10px;
            top: 15px;
            cursor: pointer;
            font-size: 14px;
        }

        .bar {
            height: 8px;
            background: #eee;
            border-radius: 5px;
            margin-top: 15px;
        }

        .strength {
            height: 100%;
            width: 0%;
            border-radius: 5px;
            transition: 0.3s;
        }

        #text {
            margin-top: 8px;
            font-weight: bold;
        }

        ul {
            margin-top: 10px;
            padding-left: 20px;
            font-size: 14px;
        }

        li {
            margin: 3px 0;
        }

        .valid {
            color: green;
        }

        .invalid {
            color: red;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Password Checker</h2>

    <div class="input-box">
        <input type="password" id="password" placeholder="Enter password" onkeyup="checkPassword()">
        <span class="toggle" onclick="togglePassword()">Show</span>
    </div>

    <div class="bar">
        <div class="strength" id="strengthBar"></div>
    </div>

    <div id="text"></div>

    <ul>
        <li id="length" class="invalid">At least 6 characters</li>
        <li id="upper" class="invalid">One uppercase letter</li>
        <li id="number" class="invalid">One number</li>
        <li id="special" class="invalid">One special character</li>
    </ul>
</div>

<script>
function checkPassword() {
    let pass = document.getElementById("password").value;
    let strength = 0;

    let length = pass.length >= 6;
    let upper = /[A-Z]/.test(pass);
    let number = /[0-9]/.test(pass);
    let special = /[!@#$%^&*]/.test(pass);

    update("length", length);
    update("upper", upper);
    update("number", number);
    update("special", special);

    if (length) strength++;
    if (upper) strength++;
    if (number) strength++;
    if (special) strength++;

    let bar = document.getElementById("strengthBar");
    let text = document.getElementById("text");

    if (strength <= 1) {
        bar.style.width = "25%";
        bar.style.background = "red";
        text.innerHTML = "Weak";
        text.style.color = "red";
    }
    else if (strength <= 3) {
        bar.style.width = "60%";
        bar.style.background = "orange";
        text.innerHTML = "Medium";
        text.style.color = "orange";
    }
    else {
        bar.style.width = "100%";
        bar.style.background = "green";
        text.innerHTML = "Strong";
        text.style.color = "green";
    }
}

function update(id, valid) {
    let element = document.getElementById(id);
    element.className = valid ? "valid" : "invalid";
}

function togglePassword() {
    let input = document.getElementById("password");
    let toggle = document.querySelector(".toggle");

    if (input.type === "password") {
        input.type = "text";
        toggle.innerHTML = "Hide";
    } else {
        input.type = "password";
        toggle.innerHTML = "Show";
    }
}
</script>

</body>
</html>
